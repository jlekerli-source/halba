<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f5ee">
    <meta name="description" content="Halba is a local-first agent workspace where completion claims open into exact-source proof and human review.">
    <title>Halba — Agent Workspace</title>
    <link rel="icon" href="halba-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./" aria-label="Halba home">
        <img src="halba-icon.svg" alt="" aria-hidden="true">
        <span>
          <strong>Halba</strong>
          <small>Agent workspace</small>
        </span>
      </a>

      <ol class="process" aria-label="Halba workflow">
        <li data-process-step="workspace"><span>1</span>Workspace</li>
        <li data-process-step="thread"><span>2</span>Agent thread</li>
        <li data-process-step="proof"><span>3</span>Proof</li>
      </ol>

      <div class="topbar-actions">
        <span id="execution-badge" class="execution-badge">Public demo</span>
        <button class="button button-secondary" type="button" data-run-mode="live">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h3l2.2-6 3.4 12 2.2-6H19"/></svg>
          Run live GPT-5.6
        </button>
        <button class="button button-primary" type="button" data-run-mode="recorded">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 7 8 5-8 5Z"/></svg>
          Run recorded demo
        </button>
      </div>
    </header>

    <div id="status-region" class="status-region" aria-live="polite"></div>

    <main id="app" class="app" aria-busy="true">
      <section class="boot-state" aria-label="Loading Halba">
        <span class="boot-mark" aria-hidden="true"></span>
        <p>Indexing the public proof bundle…</p>
      </section>
    </main>

    <input id="workspace-file" type="file" accept="application/json,.json" hidden>

    <nav id="mobile-tabs" class="mobile-tabs" aria-label="Proof Mode views" hidden>
      <button type="button" data-mobile-view="summary" aria-pressed="true">Summary</button>
      <button type="button" data-mobile-view="claims" aria-pressed="false">Claims</button>
      <button type="button" data-mobile-view="source" aria-pressed="false">Source</button>
    </nav>

    <script src="app.js" type="module"></script>
  </body>
</html>
